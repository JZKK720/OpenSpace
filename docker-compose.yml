services:
  cubecloud-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: cubecloud-dashboard:local
    ports:
      - "127.0.0.1:${CUBECLOUD_PORT:-7788}:7788"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./.openspace:/app/.openspace
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7788/api/v1/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
