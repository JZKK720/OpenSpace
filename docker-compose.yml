services:
  openspace-remote-agent:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    image: openspace-runtime:local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: "1"
      OPENSPACE_WORKSPACE: "/app"
      OPENSPACE_BACKEND_SCOPE: "${OPENSPACE_REMOTE_BACKEND_SCOPE:-shell,system}"
      OPENSPACE_MODEL: "${OPENSPACE_MODEL:-}"
      OPENSPACE_ENABLE_RECORDING: "${OPENSPACE_ENABLE_RECORDING:-true}"
      OPENSPACE_LLM_API_KEY: "${OPENSPACE_LLM_API_KEY:-}"
      OPENSPACE_LLM_API_BASE: "${OPENSPACE_LLM_API_BASE:-}"
      OPENSPACE_LLM_EXTRA_HEADERS: "${OPENSPACE_LLM_EXTRA_HEADERS:-}"
      OPENSPACE_LLM_CONFIG: "${OPENSPACE_LLM_CONFIG:-}"
      OPENSPACE_API_KEY: "${OPENSPACE_API_KEY:-}"
      OPENSPACE_API_BASE: "${OPENSPACE_API_BASE:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION: "false"
    ports:
      - "127.0.0.1:${OPENSPACE_REMOTE_AGENT_PORT:-8789}:8080"
    volumes:
      - openspace_data:/app/.openspace
      - ./logs:/app/logs
      - ./openspace/config/external_agents.json:/app/openspace/config/external_agents.json:ro
    command: ["python", "-m", "openspace.mcp_server", "--transport", "streamable-http", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; conn = socket.create_connection(('127.0.0.1', 8080), 5); conn.close()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  openspace-runtime:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    image: openspace-runtime:local
    depends_on:
      openspace-remote-agent:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: "1"
      OPENSPACE_WORKSPACE: "/app"
      OPENSPACE_BACKEND_SCOPE: "${OPENSPACE_RUNTIME_BACKEND_SCOPE:-shell,mcp,system}"
      OPENSPACE_MODEL: "${OPENSPACE_MODEL:-}"
      OPENSPACE_ENABLE_RECORDING: "${OPENSPACE_ENABLE_RECORDING:-true}"
      OPENSPACE_LLM_API_KEY: "${OPENSPACE_LLM_API_KEY:-}"
      OPENSPACE_LLM_API_BASE: "${OPENSPACE_LLM_API_BASE:-}"
      OPENSPACE_LLM_EXTRA_HEADERS: "${OPENSPACE_LLM_EXTRA_HEADERS:-}"
      OPENSPACE_LLM_CONFIG: "${OPENSPACE_LLM_CONFIG:-}"
      OPENSPACE_API_KEY: "${OPENSPACE_API_KEY:-}"
      OPENSPACE_API_BASE: "${OPENSPACE_API_BASE:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      IRONCLAW_INTERNAL_URL: "${IRONCLAW_INTERNAL_URL:-http://host.docker.internal:3231/}"
      IRONCLAW_PUBLIC_URL: "${IRONCLAW_PUBLIC_URL:-http://127.0.0.1:3231/}"
      IRONCLAW_HEALTH_URL: "${IRONCLAW_HEALTH_URL:-http://host.docker.internal:3231/}"
      IRONCLAW_ACTION_URL: "${IRONCLAW_ACTION_URL:-http://host.docker.internal:3231/api/chat/send}"
      IRONCLAW_AUTH_TOKEN: "${IRONCLAW_AUTH_TOKEN:-}"
      GATEWAY_AUTH_TOKEN: "${GATEWAY_AUTH_TOKEN:-}"
      IRONCLAW_MCP_URL: "${IRONCLAW_MCP_URL:-}"
      NANOBOT_PUBLIC_URL: "${NANOBOT_PUBLIC_URL:-http://127.0.0.1:18790/}"
      NANOBOT_INTERNAL_URL: "${NANOBOT_INTERNAL_URL:-http://host.docker.internal:18790/}"
      NANOBOT_HEALTH_URL: "${NANOBOT_HEALTH_URL:-http://host.docker.internal:18790/health}"
      NANOBOT_ACTION_URL: "${NANOBOT_ACTION_URL:-http://host.docker.internal:18790/v1/chat/completions}"
      OPENHARNESS_PUBLIC_URL: "${OPENHARNESS_PUBLIC_URL:-http://localhost:8780}"
      OPENHARNESS_INTERNAL_URL: "${OPENHARNESS_INTERNAL_URL:-http://host.docker.internal:8581}"
      OPENHARNESS_HEALTH_URL: "${OPENHARNESS_HEALTH_URL:-http://host.docker.internal:8581/health}"
      OPENSPACE_REMOTE_INTERNAL_URL: "http://openspace-remote-agent:8080/mcp"
      OPENSPACE_REMOTE_HEALTH_URL: "http://openspace-remote-agent:8080/mcp"
      OPENSPACE_REMOTE_MCP_URL: "http://openspace-remote-agent:8080/mcp"
    ports:
      - "127.0.0.1:${OPENSPACE_RUNTIME_PORT:-8788}:8080"
    volumes:
      - openspace_data:/app/.openspace
      - ./logs:/app/logs
      - ./openspace/config/external_agents.json:/app/openspace/config/external_agents.json:ro
    command: ["python", "-m", "openspace.mcp_server", "--transport", "streamable-http", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; conn = socket.create_connection(('127.0.0.1', 8080), 5); conn.close()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  agents-monitor:
    build:
      context: .
      dockerfile: Dockerfile.agents-monitor
    image: agents-monitor:local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${AGENTS_MONITOR_PORT:-5173}:5173"
    volumes:
      - ./openspace/config/external_agents.json:/app/openspace/config/external_agents.json:ro
    environment:
      NODE_ENV: production
      PORT: "5173"
      IRONCLAW_INTERNAL_URL: "${IRONCLAW_INTERNAL_URL:-http://host.docker.internal:3231/}"
      IRONCLAW_PUBLIC_URL: "${IRONCLAW_PUBLIC_URL:-http://127.0.0.1:3231/}"
      IRONCLAW_HEALTH_URL: "${IRONCLAW_HEALTH_URL:-http://host.docker.internal:3231/}"
      IRONCLAW_ACTION_URL: "${IRONCLAW_ACTION_URL:-http://host.docker.internal:3231/api/chat/send}"
      IRONCLAW_MCP_URL: "${IRONCLAW_MCP_URL:-}"
      NANOBOT_PUBLIC_URL: "${NANOBOT_PUBLIC_URL:-http://127.0.0.1:18790/}"
      NANOBOT_INTERNAL_URL: "${NANOBOT_INTERNAL_URL:-http://host.docker.internal:18790/}"
      NANOBOT_HEALTH_URL: "${NANOBOT_HEALTH_URL:-http://host.docker.internal:18790/health}"
      NANOBOT_ACTION_URL: "${NANOBOT_ACTION_URL:-http://host.docker.internal:18790/v1/chat/completions}"
      OPENHARNESS_PUBLIC_URL: "${OPENHARNESS_PUBLIC_URL:-http://localhost:8780}"
      OPENHARNESS_INTERNAL_URL: "${OPENHARNESS_INTERNAL_URL:-http://host.docker.internal:8581}"
      OPENHARNESS_HEALTH_URL: "${OPENHARNESS_HEALTH_URL:-http://host.docker.internal:8581/health}"
      OPENSPACE_REMOTE_INTERNAL_URL: "http://openspace-remote-agent:8080/mcp"
      OPENSPACE_REMOTE_HEALTH_URL: "http://openspace-remote-agent:8080/mcp"
      OPENSPACE_REMOTE_MCP_URL: "http://openspace-remote-agent:8080/mcp"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173/healthz').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  cubecloud-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: cubecloud-dashboard:local
    depends_on:
      agents-monitor:
        condition: service_healthy
      openspace-remote-agent:
        condition: service_healthy
    ports:
      - "127.0.0.1:${CUBECLOUD_PORT:-7788}:7788"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: "1"
      MY_DAILY_MONITOR_INTERNAL_URL: "http://agents-monitor:5173/"
      MY_DAILY_MONITOR_PUBLIC_URL: "http://127.0.0.1:${AGENTS_MONITOR_PORT:-5173}/"
      IRONCLAW_INTERNAL_URL: "${IRONCLAW_INTERNAL_URL:-http://host.docker.internal:3231/}"
      IRONCLAW_PUBLIC_URL: "${IRONCLAW_PUBLIC_URL:-http://127.0.0.1:3231/}"
      IRONCLAW_HEALTH_URL: "${IRONCLAW_HEALTH_URL:-http://host.docker.internal:3231/}"
      IRONCLAW_ACTION_URL: "${IRONCLAW_ACTION_URL:-http://host.docker.internal:3231/api/chat/send}"
      IRONCLAW_AUTH_TOKEN: "${IRONCLAW_AUTH_TOKEN:-}"
      GATEWAY_AUTH_TOKEN: "${GATEWAY_AUTH_TOKEN:-}"
      IRONCLAW_MCP_URL: "${IRONCLAW_MCP_URL:-}"
      NANOBOT_PUBLIC_URL: "${NANOBOT_PUBLIC_URL:-http://127.0.0.1:18790/}"
      NANOBOT_INTERNAL_URL: "${NANOBOT_INTERNAL_URL:-http://host.docker.internal:18790/}"
      NANOBOT_HEALTH_URL: "${NANOBOT_HEALTH_URL:-http://host.docker.internal:18790/health}"
      NANOBOT_ACTION_URL: "${NANOBOT_ACTION_URL:-http://host.docker.internal:18790/v1/chat/completions}"
      OPENSPACE_REMOTE_INTERNAL_URL: "http://openspace-remote-agent:8080/mcp"
      OPENSPACE_REMOTE_HEALTH_URL: "http://openspace-remote-agent:8080/mcp"
      OPENSPACE_REMOTE_MCP_URL: "http://openspace-remote-agent:8080/mcp"
      OPENHARNESS_PUBLIC_URL: "${OPENHARNESS_PUBLIC_URL:-http://localhost:8780}"
      OPENHARNESS_INTERNAL_URL: "${OPENHARNESS_INTERNAL_URL:-http://host.docker.internal:8581}"
      OPENHARNESS_HEALTH_URL: "${OPENHARNESS_HEALTH_URL:-http://host.docker.internal:8581/health}"
    volumes:
      - openspace_data:/app/.openspace
      - ./logs:/app/logs
      - ./openspace/config/external_agents.json:/app/openspace/config/external_agents.json:ro
      - ./openspace/config/standalone_apps.json:/app/openspace/config/standalone_apps.json:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7788/api/v1/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  openspace_data:
